# the name by which the project can be referenced within Serena
project_name: "Nova-Blog"

# Language servers:
#   - php: WordPress theme PHP files (functions.php, template-parts, inc/)
#   - typescript: handles JavaScript files (toc.js, search.js, ripple.js, etc.)
#   Note: "vue" was removed — this project has no .vue files
#   Note: For JavaScript, Serena docs say to use "typescript" (TS LSP also handles .js)
languages:
- php
- typescript

# the encoding used by text files in the project
# For a list of possible encodings, see https://docs.python.org/3.11/library/codecs.html#standard-encodings
encoding: "utf-8"

# whether to use project's .gitignore files to ignore files
ignore_all_files_in_gitignore: true

# Additional paths to ignore (build artifacts, tooling, screenshots, etc.)
ignored_paths:
- "node_modules/**"
- ".playwright-mcp/**"
- "flavor-theme/assets/dist/**"
- "screenshots/**"
- "docs/**"
- "*.png"
- "*.jpeg"
- "*.zip"
- "*.woff2"

# whether the project is in read-only mode
# If set to true, all editing tools will be disabled and attempts to use them will result in an error
# Added on 2025-04-18
read_only: false

# Exclude tools that duplicate Claude Code's native capabilities or are rarely used
# in this WordPress theme development workflow
excluded_tools:
  # Claude Code already has better file ops — avoid confusion
- execute_shell_command
- create_text_file
- think_about_collected_information
- think_about_task_adherence
- think_about_whether_you_are_done
- initial_instructions
- prepare_for_new_conversation
- activate_project
- check_onboarding_performed
- switch_modes
- get_current_config

# list of tools to include that would otherwise be disabled (particularly optional tools that are disabled by default)
included_optional_tools: []

# fixed set of tools — leave empty to use Serena defaults minus excluded
fixed_tools: []

# modes
base_modes:

# list of mode names that are to be activated by default.
# The full set of modes to be activated is base_modes + default_modes.
# If the setting is undefined, the default_modes from the global configuration (serena_config.yml) apply.
# Otherwise, this overrides the setting from the global configuration (serena_config.yml).
# This setting can, in turn, be overridden by CLI parameters (--mode).
default_modes:

# Initial prompt: provides project context on every session activation
initial_prompt: |
  This is Nova-Blog, a WordPress blog theme called "Flavor Theme".

  Tech stack:
  - PHP 8.0+ (WordPress theme with classic template hierarchy)
  - Vanilla JavaScript (no framework, no TypeScript — just .js files)
  - CSS with Material Design 3 token system (custom properties)
  - esbuild for asset minification (npm run build)

  Key directories:
  - flavor-theme/            — the WordPress theme root
  - flavor-theme/inc/        — PHP includes (enqueue, customizer, walker, SEO, widgets)
  - flavor-theme/assets/css/ — source CSS files (base, tokens, components, theme)
  - flavor-theme/assets/js/  — source JS files (toc, search, ripple, navigation, etc.)
  - flavor-theme/assets/dist/— minified build output (DO NOT edit directly)
  - flavor-theme/template-parts/ — reusable template partials

  Build & Deploy:
  - Build: cd flavor-theme && npm run build
  - Deploy: ZIP upload via WordPress admin /wp-admin/theme-install.php
  - Version: FLAVOR_VERSION constant in functions.php (bump for cache busting)

  Conventions:
  - BEM naming for CSS classes (e.g., .post-card__footer)
  - M3 design tokens as CSS custom properties (--md-sys-color-*, --md-sys-typescale-*)
  - Chinese (zh-CN) localization for user-facing strings
# override of the corresponding setting in serena_config.yml
symbol_info_budget:

# The language backend to use for this project.
# If not set, the global setting from serena_config.yml is used.
# Valid values: LSP, JetBrains
# Note: the backend is fixed at startup. If a project with a different backend
# is activated post-init, an error will be returned.
language_backend:
